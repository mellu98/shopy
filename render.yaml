databases:
  - name: theme-builder-db
    plan: free
    databaseName: theme_builder
    user: theme_builder

services:
  - type: web
    plan: free
    name: theme-builder
    runtime: node
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: theme-builder-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4.5
      - key: OPENROUTER_IMAGE_MODEL
        value: google/gemini-3.1-flash-image-preview
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_themes,write_themes,read_products,read_content
      - key: SHOPIFY_APP_URL
        sync: false
